spring.application.name=spring-notifications
server.port=8080
logging.level.org.example=INFO
spring.datasource.url=${DB_URL:jdbc:h2:mem:notifications;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=verySecretKeyForJwtTokenVerySecretKey12345verySecretKey
app.jwt.expiration-ms=3600000
